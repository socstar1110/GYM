<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健身紀錄系統</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h2 { text-align: center; color: #333; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .flex-row { display: flex; gap: 10px; }
        .flex-item { flex: 1; }
        .range-group { display: flex; align-items: center; gap: 5px; }
        .add-area { margin-top: 10px; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px dashed #ccc; }
        .btn-main { width: 100%; padding: 15px; background: #007aff; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        .btn-add { background: #34c759; width: auto; padding: 10px; margin-left: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🏋️ 訓練紀錄</h2>

    <div class="input-group">
        <label>訓練日期</label>
        <input type="date" id="inputDate">
    </div>

    <div class="input-group">
        <label>訓練主項</label>
        <select id="categorySelect" onchange="updateExerciseOptions()">
            <option value="Leg">Leg (下肢)</option>
            <option value="Push">Push (推)</option>
            <option value="Pull">Pull (拉)</option>
        </select>
    </div>

    <div class="input-group">
        <label>動作名稱</label>
        <select id="actionSelect"></select>
        <div class="add-area">
            <label style="font-size: 12px;">手動新增動作至此分類：</label>
            <div style="display: flex;">
                <input type="text" id="newActionInput" placeholder="例如：保加利亞蹲">
                <button class="btn-main btn-add" onclick="addNewAction()">新增</button>
            </div>
        </div>
    </div>

    <div class="flex-row">
        <div class="input-group flex-item">
            <label>重量 (kg)</label>
            <input type="number" id="weight" step="0.5">
        </div>
        <div class="input-group flex-item">
            <label>組數 (Sets)</label>
            <input type="number" id="sets">
        </div>
    </div>

    <div class="input-group">
        <label>次數範圍 (Reps Range)</label>
        <div class="range-group">
            <input type="number" id="repsMin" placeholder="Min">
            <span>~</span>
            <input type="number" id="repsMax" placeholder="Max">
        </div>
    </div>

    <button class="btn-main" onclick="saveLog()">儲存本次訓練</button>
    <div id="status" style="margin-top:15px; text-align:center; font-size:12px; color: #666;"></div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz7uHCEFtKkUWjnPwbzVu7o3aHichTMpHHsSMnQX36bDHWg9WKJZlsE-FmT2SLngv9RbA/exec"; // ⚠️ 請更換為你的部署網址
    let exerciseLib = {};

    // [Function 1] 初始化：設定日期並從 Google 抓取最新動作庫
    window.onload = function() {
        document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
        refreshLibrary();
    };

    // [Function 2] 從雲端重新獲取最新的動作清單數據
    function refreshLibrary() {
        document.getElementById('status').innerText = "正在從雲端更新動作庫...";
        fetch(`${GAS_URL}?type=getLib`)
            .then(res => res.json())
            .then(data => {
                exerciseLib = data;
                updateExerciseOptions();
                document.getElementById('status').innerText = "雲端同步完成";
            })
            .catch(err => alert("讀取失敗，請檢查網路或 GAS URL"));
    }

    // [Function 3] 根據選取的分類 (Leg/Push/Pull) 動態更新動作下拉選單
    function updateExerciseOptions() {
        const category = document.getElementById('categorySelect').value;
        const actionSelect = document.getElementById('actionSelect');
        actionSelect.innerHTML = "";
        
        if (exerciseLib[category]) {
            exerciseLib[category].forEach(ex => {
                const opt = document.createElement('option');
                opt.value = ex;
                opt.text = ex;
                actionSelect.add(opt);
            });
        }
    }

    // [Function 4] 將新動作傳送到雲端 Library 並刷新清單
    function addNewAction() {
        const category = document.getElementById('categorySelect').value;
        const actionName = document.getElementById('newActionInput').value.trim();
        if (!actionName) return;

        document.getElementById('status').innerText = "正在新增動作...";
        fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ type: "addNewAction", category: category, action: actionName })
        }).then(() => {
            setTimeout(refreshLibrary, 1200); // 延遲刷新以確保雲端已寫入
            document.getElementById('newActionInput').value = "";
        });
    }

    // [Function 5] 儲存正式訓練紀錄至雲端 Log
    function saveLog() {
        const logData = {
            id: "MyiPhone", // 可自行修改標記
            date: document.getElementById('inputDate').value,
            prog: document.getElementById('categorySelect').value,
            ex: document.getElementById('actionSelect').value,
            w: document.getElementById('weight').value,
            s: document.getElementById('sets').value,
            r: `${document.getElementById('repsMin').value}-${document.getElementById('repsMax').value}`
        };

        if(!logData.w || !logData.s || !document.getElementById('repsMin').value) {
            alert("請填寫完整數據");
            return;
        }

        document.getElementById('status').innerText = "正在儲存紀錄...";
        fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify(logData)
        })
        .then(res => res.text())
        .then(msg => {
            alert(msg);
            document.getElementById('status').innerText = "最後儲存時間: " + new Date().toLocaleTimeString();
        });
    }
</script>

</body>
</html>
